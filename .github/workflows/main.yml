name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    name: A long process
    runs-on: ubuntu-latest

    steps:
      - name: A 30 seconds process
        run: |
          sleep 30s
          mkdir releases
          echo 'first' > releases/first.txt
          echo 'second' > releases/second.txt
          echo 'third' > releases/third.txt
          echo 'forth' > releases/forth.txt

      - uses: actions/upload-artifact@v7
        with:
          name: release-archives
          overwrite: true
          path: releases/*.txt
