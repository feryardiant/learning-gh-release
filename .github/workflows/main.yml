name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    name: A long process
    runs-on: ubuntu-latest

    steps:
      - name: A 30 seconds process
        run: |
          sleep 30s
          mkdir releases
          echo 'another first' > releases/first.txt
          echo 'another second' > releases/second.txt
          echo 'another third' > releases/third.txt

      - uses: actions/upload-artifact@v7
        with:
          name: release-archives
          overwrite: true
          path: releases/*.txt

  update-releases:
    name: Update release assets
    needs: build
    if: |-
      github.event_name == 'push' &&
      startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: release-archives
          path: releases

      - name: Update release assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LATEST_COMMIT: ${{ github.event.head_commit.message }}
        run: |
          RELEASE_VERSION=$(echo "$LATEST_COMMIT" | head -n 1 | sed 's/chore(release): /v/')

          echo "Release version: $RELEASE_VERSION"

          for _ in {1..10}; do
            echo "Checking for release $RELEASE_VERSION to be available..."
            gh release view "$RELEASE_VERSION" >/dev/null 2>&1 && break
            sleep 5s
          done

          gh release view "$RELEASE_VERSION" >/dev/null 2>&1 || {
            echo "Release $RELEASE_VERSION is not available yet"
            exit 0
          }

          shopt -s nullglob

          for to_upload in releases/*.zip; do
            [[ -z "$to_upload" || ! -f "$to_upload" ]] && continue

            echo "Uploading $to_upload..."
            gh release upload "$RELEASE_VERSION" "${to_upload}" --clobber
          done
