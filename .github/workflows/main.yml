name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    name: A long process
    runs-on: ubuntu-latest
    outputs:
      should-upload: ${{ steps.dist-archive.outputs.should-upload }}

    steps:
      - name: A 30 seconds build
        run: |
          sleep 30s

      - name: Simulating build ouputs
        id: dist-archive
        if: github.event_name == 'push' && github.ref_name == 'main'
        run: |
          mkdir releases
          echo 'another first' > releases/first.txt
          echo 'another second' > releases/second.txt
          echo 'another third' > releases/third.txt

          echo "should-upload=1" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v7
        if: steps.dist-archive.outputs.should-upload == '1'
        with:
          name: release-archives
          overwrite: true
          path: releases

  update-assets:
    name: Update assets
    needs: build
    if: |-
      needs.build.outputs.should-upload == '1' &&
      startsWith(github.event.head_commit.message, 'chore(release):')
    uses: projek-xyz/actions/.github/workflows/uploads.yml@release-assets
    with:
      workflow_name: ${{ github.workflow }}

    permissions:
      contents: write
